trigger:
branches:
include:
  - main

pool:
vmImage: "ubuntu-latest"

stages:
  stage: Terraform init
  jobs:
    - job: TerraformInit
      steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: "latest"
        - script: |
            terraform init
          displayName: "Terraform Init"
